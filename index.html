<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAV Safety Guide Spain | Pro Edition</title>
    <meta name="description" content="Guía oficial de seguridad para drones en España con integración ENAIRE y AEMET." />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Leaflet & Fonts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <!-- Premium Top Bar -->
      <nav class="top-bar glass-panel">
        <div class="brand">
          <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" class="text-accent">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
          <div>
            <h1>UAV SAFETY <span style="color:var(--accent-blue)">SPAIN</span></h1>
            <span class="badge-pro">PRO EDITION</span>
          </div>
        </div>

        <div class="search-container">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--text-dim)" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="search-input" placeholder="Buscar zona o ciudad..." />
        </div>

        <div class="user-actions">
          <button class="btn-primary" id="login-drive">Cloud Sync</button>
        </div>
      </nav>

      <!-- Main Map Interface -->
      <main id="map"></main>

      <!-- Situational Awareness floating panels -->
      <aside class="status-floating glass-panel" id="status-card">
        <div class="status-indicator">
          <div class="dot green" id="status-dot"></div>
          <div>
            <h2 id="status-title" style="font-size: 0.95rem; font-weight: 800;">APTO PARA VUELO</h2>
            <p id="status-sub" style="font-size: 0.75rem; color: var(--text-dim);">Haz clic en el mapa para ver detalles.</p>
          </div>
        </div>
        
        <div class="restriction-container" id="restriction-list">
          <div class="empty-state">No hay restricciones detectadas en esta ubicación.</div>
        </div>
      </aside>

      <aside class="weather-widget glass-panel" id="weather-panel">
        <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;">Meteorología local</div>
        <div id="weather-info" style="font-size: 1.2rem; font-weight: 600;">
          --°C <span style="font-size: 0.8rem; opacity: 0.6;">- km/h</span>
        </div>
        <div id="weather-alert" style="font-size: 0.7rem; margin-top: 4px; color: var(--accent-warn);"></div>
      </aside>

      <!-- Bottom Floating Buttons -->
      <div class="bottom-actions">
        <div class="action-btn glass-panel" id="locate-btn" title="Mi ubicación">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </div>
        <div class="action-btn glass-panel" id="layer-btn" title="Tipo de mapa">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        </div>
        <div class="action-btn glass-panel" id="pro-assistant-btn" style="background: var(--accent-blue); color: #000; border: none;" title="Comunicación Ministerio">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
  </body>
</html>
